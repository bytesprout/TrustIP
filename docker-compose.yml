services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: trustip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trustip_db
      POSTGRES_USER: trustip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trustip_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustip -d trustip_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trustip-network

  # ============================================================
  # Redis Cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: trustip-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_password}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trustip-network

  # ============================================================
  # NestJS API
  # ============================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: trustip-api
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      DATABASE_URL: postgresql://trustip:${POSTGRES_PASSWORD:-trustip_dev_password}@postgres:5432/trustip_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_password}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379
      APP_URL: http://localhost:8080
      ADMIN_URL: http://localhost:3000
      GEO_ENGINE_DATASET_PATH: /data/datasets/current/geolite
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      SECURITY_ABUSE_WINDOW_SECONDS: ${SECURITY_ABUSE_WINDOW_SECONDS:-300}
      SECURITY_ABUSE_THRESHOLD: ${SECURITY_ABUSE_THRESHOLD:-8}
      SECURITY_BLOCK_SECONDS: ${SECURITY_BLOCK_SECONDS:-900}
    volumes:
      - ./data/datasets:/data/datasets:rw
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trustip-network

  # ============================================================
  # Next.js Admin Panel
  # ============================================================
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: trustip-admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_this_nextauth_secret_min_32_chars}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trustip-network

  # ============================================================
  # Nginx Reverse Proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: trustip-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - admin
    networks:
      - trustip-network

  # ============================================================
  # Prometheus
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: trustip-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - trustip-network

  # ============================================================
  # Loki
  # ============================================================
  loki:
    image: grafana/loki:3.1.1
    container_name: trustip-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./infrastructure/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - trustip-network

  # ============================================================
  # Grafana
  # ============================================================
  grafana:
    image: grafana/grafana:11.2.2
    container_name: trustip-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - trustip-network

  # ============================================================
  # OpenTelemetry Collector
  # ============================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: trustip-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infrastructure/monitoring/otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - trustip-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

networks:
  trustip-network:
    driver: bridge
    name: trustip-network
