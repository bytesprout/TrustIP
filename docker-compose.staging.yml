# Staging overrides
services:
  api:
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
      NODE_ENV: production
      APP_URL: https://api-staging.trustip.io
      ADMIN_URL: https://admin-staging.trustip.io
    restart: always

  admin:
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api-staging.trustip.io
      NEXTAUTH_URL: https://admin-staging.trustip.io
    restart: always

  postgres:
    ports: []
    restart: always

  redis:
    ports: []
    restart: always

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    restart: always

  worker:
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
    restart: always

  geo-engine:
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
    restart: always

  trust-engine:
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
    restart: always

  dataset-updater:
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
    restart: always
