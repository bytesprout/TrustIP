# Production overrides
services:
  api:
    environment:
      APP_ENV: production
      NODE_ENV: production
      GEO_ENGINE_DATASET_PATH: /data/datasets/current/geolite
    volumes:
      - ./data/datasets:/data/datasets:rw
    restart: always

  admin:
    environment:
      NODE_ENV: production
    restart: always

  postgres:
    ports: [] # Don't expose DB port in production
    restart: always

  redis:
    ports: [] # Don't expose Redis port in production
    restart: always

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    restart: always
