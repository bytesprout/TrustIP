groups:
  - name: trustip-critical-alerts
    rules:
      - alert: TrustIPApiDown
        expr: up{job="trustip-api"} == 0
        for: 2m
        labels:
          severity: CRITICAL
        annotations:
          summary: "TrustIP API is down"

      - alert: TrustIPHighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(trustip_http_request_latency_ms_bucket[5m])) by (le)) > 100
        for: 5m
        labels:
          severity: WARNING
        annotations:
          summary: "TrustIP API P95 latency above 100ms"

      - alert: TrustIPHighErrorRate
        expr: (sum(rate(trustip_http_errors_total[5m])) / sum(rate(trustip_http_requests_total[5m]))) > 0.005
        for: 5m
        labels:
          severity: CRITICAL
        annotations:
          summary: "TrustIP API error rate above 0.5%"

      - alert: TrustIPFailedPaymentsSpike
        expr: trustip_billing_failed_payments > 20
        for: 10m
        labels:
          severity: WARNING
        annotations:
          summary: "Failed payment attempts exceeded threshold"
