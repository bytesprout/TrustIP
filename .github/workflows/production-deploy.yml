name: Production Deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release image tag for rollback reference
        required: true
        type: string

jobs:
  approval:
    name: Manual Approval
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Approved
        run: echo "Production deployment approved"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: approval
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build release images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: trustip/api:${{ inputs.release_tag }}

      - name: Build admin release image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
          tags: trustip/admin:${{ inputs.release_tag }}

      - name: Deploy production stack
        run: |
          chmod +x infrastructure/scripts/deploy.sh infrastructure/scripts/rollback.sh infrastructure/scripts/healthcheck.sh infrastructure/ci/smoke-test.sh
          cp infrastructure/environments/production/.env.template .env.production
          SKIP_PULL=1 ./infrastructure/scripts/deploy.sh production

      - name: Validate production health
        run: ./infrastructure/ci/smoke-test.sh http://localhost:8080

      - name: Rollback on failure
        if: failure()
        run: ./infrastructure/scripts/rollback.sh production ${{ inputs.release_tag }}
